<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Xodim Paneli - Parkent TET</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #00d2d3;
            --success-color: #10ac84;
            --danger-color: #ff6b6b;
            --border-color: #334155;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-color); color: var(--text-color);
            display: flex; flex-direction: column; min-height: 100vh;
            overflow-x: hidden;
        }

        /* Kirish ekrani */
        #login-screen {
            position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg-color);
            z-index: 999; display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .login-card {
            background: var(--card-bg); width: 100%; max-width: 450px; padding: 35px 25px;
            border-radius: 20px; border: 1px solid var(--border-color); text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .login-card h1 { font-size: 26px; margin-bottom: 25px; color: var(--accent-color); letter-spacing: 1px; }
        .login-card input {
            width: 100%; padding: 18px; margin: 12px 0; border: 2px solid var(--border-color);
            border-radius: 12px; background: #0f172a; color: white; font-size: 18px;
        }
        .login-card button {
            width: 100%; padding: 18px; background: var(--success-color); color: white;
            border: none; border-radius: 12px; font-weight: bold; font-size: 20px; margin-top: 15px; cursor: pointer;
        }

        /* Asosiy Ekran */
        #main-app { display: none; padding: 15px; flex-grow: 1; display: flex; flex-direction: column; gap: 20px; }
        
        /* Shlyapa qismi */
        header {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card-bg); padding: 18px; border-radius: 16px; border: 1px solid var(--border-color);
        }
        header h2 { margin: 0; font-size: 20px; }
        .gps-badge {
            background: var(--danger-color); color: white; padding: 8px 14px;
            border-radius: 30px; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 6px;
        }
        .gps-active { background: var(--success-color); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }

        /* Blok Sarlavhalari */
        .section-title { font-size: 19px; font-weight: bold; margin-bottom: 10px; color: var(--accent-color); display: flex; align-items: center; gap: 8px; }

        /* Reja va Topshiriq kartalari (Juda yirik va qulay) */
        .task-card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 16px; padding: 20px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .task-info h3 { margin: 0 0 5px 0; font-size: 20px; }
        .task-info p { margin: 0; font-size: 15px; color: #94a3b8; }
        .btn-complete {
            padding: 14px 20px; background: var(--success-color); color: white;
            border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer;
        }
        .task-done { background: #1e293b; border-color: var(--success-color); opacity: 0.7; }
        .status-text { color: var(--success-color); font-weight: bold; font-size: 16px; }

        /* "Aloqa tugmasi" */
        .btn-chat-toggle {
            width: 100%; padding: 18px; background: #3b82f6; color: white; border: none;
            border-radius: 16px; font-weight: bold; font-size: 18px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); margin-top: 10px;
        }

        /* To'liq Ekranli Chat Modali */
        #chat-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 1000;
            display: none; flex-direction: column; padding: 20px;
        }
        .chat-modal-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 15px;
        }
        .chat-messages {
            flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-bottom: 15px;
        }
        .chat-msg {
            padding: 14px 18px; border-radius: 16px; max-width: 85%; line-height: 1.4; font-size: 16px; word-wrap: break-word;
        }
        .msg-in { background: #334155; align-self: flex-start; color: white; border-bottom-left-radius: 4px; }
        .msg-out { background: var(--accent-color); align-self: flex-end; color: #0f172a; font-weight: bold; border-bottom-right-radius: 4px; }
        
        .chat-input-area { display: flex; gap: 10px; }
        .chat-input-area input {
            flex-grow: 1; padding: 18px; border: 2px solid var(--border-color);
            border-radius: 12px; background: #0f172a; color: white; font-size: 16px;
        }
        .chat-input-area button {
            padding: 0 25px; background: var(--accent-color); border: none;
            color: #0f172a; font-weight: bold; font-size: 16px; border-radius: 12px; cursor: pointer;
        }
        .btn-close-chat {
            padding: 10px 18px; background: var(--danger-color); color: white; border: none;
            border-radius: 10px; font-weight: bold; font-size: 14px; cursor: pointer;
        }

        /* Chiqish tugmasi */
        .btn-logout {
            width: 100%; padding: 14px; background: #334155; color: white; border: none;
            border-radius: 12px; font-weight: bold; font-size: 15px; margin-top: auto; cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Kirish Ekran -->
    <div id="login-screen">
        <div class="login-card">
            <h1>PARKENT TET<br><span style="font-size: 16px; color:#94a3b8;">Xodimlar Tizimi</span></h1>
            <input type="text" id="userLogin" placeholder="Login">
            <input type="password" id="userPass" placeholder="Parol">
            <button onclick="tryLogin()">Tizimga Kirish</button>
            <p id="loginErr" style="color:var(--danger-color); display:none; margin-top:15px; font-weight:bold; font-size:16px;"></p>
        </div>
    </div>

    <!-- Asosiy Mobil Ilova -->
    <div id="main-app">
        <header>
            <div>
                <h2 id="employee-name">Yuklanmoqda...</h2>
                <span style="font-size:14px; color:#94a3b8;" id="employee-id">ID: --</span>
            </div>
            <div id="gps-status" class="gps-badge">GPS OFF</div>
        </header>

        <!-- Topshiriqlar Bloki -->
        <div>
            <div class="section-title">📍 Kunlik Reja (Marshrut)</div>
            <div id="tasks-container">
                <p style="color:#94a3b8; font-size:16px; text-align:center; padding: 20px;">Hozircha reja biriktirilmagan.</p>
            </div>
        </div>

        <!-- Aloqa modalini ochish tugmasi -->
        <button class="btn-chat-toggle" onclick="openChatModal()">
            💬 Admin bilan bog'lanish 
        </button>

        <button class="btn-logout" onclick="logout()">Tizimdan chiqish 🚪</button>
    </div>

    <!-- Aloqa Modali (Yashirin Oyna) -->
    <div id="chat-modal">
        <div class="chat-modal-header">
            <h2 style="margin: 0; color: var(--accent-color); font-size: 20px;">💬 Tezkor Yozishmalar</h2>
            <button class="btn-close-chat" onclick="closeChatModal()">Yopish ✖</button>
        </div>
        <div class="chat-messages" id="chat-box"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Xabarni kiriting...">
            <button onclick="sendMessage()">Yuborish</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://sgnuqwqbyystmyfgikko.supabase.co";
        const SUPABASE_KEY = "sb_publishable_M0j9s_er4k9wDiZgBNWQuQ_1YyqHFY8";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentXodim = null;
        let watchId = null;

        window.onload = function() {
            const saved = localStorage.getItem('xodim_user');
            if (saved) {
                currentXodim = JSON.parse(saved);
                startApp();
            }
        }

        async function tryLogin() {
            const login = document.getElementById('userLogin').value.trim();
            const pass = document.getElementById('userPass').value.trim();
            const errBox = document.getElementById('loginErr');

            if (!login || !pass) {
                errBox.innerText = "Iltimos, maydonlarni to'ldiring!";
                errBox.style.display = "block";
                return;
            }

            const { data, error } = await supabaseClient
                .from('xodimlar_gps')
                .select('*')
                .eq('login', login)
                .eq('parol', pass)
                .single();

            if (error || !data) {
                errBox.innerText = "Login yoki parol xato!";
                errBox.style.display = "block";
            } else {
                currentXodim = data;
                
                // TIZIMGA KIRISh BILANOQ ONLINE QILISh
                const isoDate = new Date().toISOString();
                await supabaseClient.from('xodimlar_gps').update({
                    status: 'online',
                    updated_at: isoDate
                }).eq('id', currentXodim.id);

                localStorage.setItem('xodim_user', JSON.stringify(data));
                document.getElementById('login-screen').style.display = 'none';
                startApp();
            }
        }

        function startApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('employee-name').innerText = currentXodim.ism;
            document.getElementById('employee-id').innerText = "ID: " + currentXodim.id;

            startGPSTracking();
            fetchTasks();
            loadChat();

            // Avtomatik yangilanishlar
            setInterval(fetchTasks, 10000);
            setInterval(loadChat, 4000);
            setInterval(sendHeartbeat, 12000); // Online holatini doim yangilab turadi
        }

        // GPS orqali kuzatishni faollashtirish
        function startGPSTracking() {
            const gpsBadge = document.getElementById('gps-status');

            if ("geolocation" in navigator) {
                watchId = navigator.geolocation.watchPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;

                    gpsBadge.innerText = "GPS ON";
                    gpsBadge.className = "gps-badge gps-active";

                    const isoDate = new Date().toISOString();
                    await supabaseClient.from('xodimlar_gps').update({
                        lat: lat,
                        lng: lng,
                        status: 'online',
                        updated_at: isoDate
                    }).eq('id', currentXodim.id);

                }, (error) => {
                    console.error("GPS xatolik:", error);
                    gpsBadge.innerText = "GPS Xato";
                    gpsBadge.className = "gps-badge";
                }, {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 10000
                });
            } else {
                gpsBadge.innerText = "GPS Yo'q";
            }
        }

        // Doimiy ravishda onlaynlikni yangilab turish (Heartbeat)
        async function sendHeartbeat() {
            if (currentXodim) {
                const isoDate = new Date().toISOString();
                await supabaseClient.from('xodimlar_gps').update({
                    status: 'online',
                    updated_at: isoDate
                }).eq('id', currentXodim.id);
            }
        }

        async function fetchTasks() {
            if (!currentXodim) return;
            const { data, error } = await supabaseClient
                .from('vazifalar')
                .select('*')
                .eq('xodim_id', currentXodim.id)
                .order('nuqta_nomi', { ascending: true });

            if (!error && data) {
                const container = document.getElementById('tasks-container');
                if (data.length === 0) {
                    container.innerHTML = `<p style="color:#94a3b8; font-size:16px; text-align:center; padding: 20px;">Bugungi reja hali belgilanmagan.</p>`;
                    return;
                }

                container.innerHTML = data.map(t => {
                    const isDone = t.bajarildi;
                    return `
                        <div class="task-card ${isDone ? 'task-done' : ''}">
                            <div class="task-info">
                                <h3>Nuqta: ${t.nuqta_nomi}</h3>
                                <p>Holat: ${isDone ? 'Bajarilgan ✅' : 'Kutilmoqda ❌'}</p>
                            </div>
                            <div>
                                ${isDone ? 
                                    `<span class="status-text">Bajarildi</span>` : 
                                    `<button class="btn-complete" onclick="completeTask(${t.id})">Bajarildi ✅</button>`
                                }
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }

        async function completeTask(taskId) {
            const { error } = await supabaseClient
                .from('vazifalar')
                .update({ bajarildi: true })
                .eq('id', taskId);

            if (!error) {
                fetchTasks();
            } else {
                alert("Tizimda uzilish bo'ldi, qayta urining.");
            }
        }

        // Chat funksiyalari
        function openChatModal() {
            document.getElementById('chat-modal').style.display = 'flex';
            loadChat();
        }

        function closeChatModal() {
            document.getElementById('chat-modal').style.display = 'none';
        }

        async function loadChat() {
            if (!currentXodim) return;
            const myId = currentXodim.id;

            const { data } = await supabaseClient
                .from('chat_messages')
                .select('*')
                .or(`sender_id.eq.${myId},receiver_id.eq.${myId}`)
                .order('created_at', { ascending: true });

            if (data) {
                const limit = 30; // 30 ta limit
                if (data.length > limit) {
                    const deleteCount = data.length - limit;
                    const oldMessages = data.slice(0, deleteCount);
                    
                    for(let i = 0; i < oldMessages.length; i++) {
                        await supabaseClient.from('chat_messages').delete().eq('id', oldMessages[i].id);
                    }
                    loadChat();
                    return;
                }

                const box = document.getElementById('chat-box');
                box.innerHTML = data.map(m => `
                    <div class="chat-msg ${m.sender_id === myId ? 'msg-out' : 'msg-in'}">
                        ${m.message}
                    </div>
                `).join('');
                box.scrollTop = box.scrollHeight;
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg || !currentXodim) return;

            await supabaseClient.from('chat_messages').insert([{
                sender_id: currentXodim.id,
                receiver_id: 'admin',
                message: msg
            }]);

            input.value = '';
            loadChat();
        }

        // CHIQISHDA OFFLAYN QILISh
        async function logout() {
            if (confirm("Haqiqatdan ham tizimdan chiqmoqchimisiz?")) {
                if (watchId) navigator.geolocation.clearWatch(watchId);
                
                if (currentXodim) {
                    const isoDate = new Date().toISOString();
                    // Tizimda oflayn qilish va yangilash
                    await supabaseClient.from('xodimlar_gps')
                        .update({ status: 'offline', updated_at: isoDate })
                        .eq('id', currentXodim.id);
                }

                localStorage.removeItem('xodim_user');
                currentXodim = null;
                document.getElementById('main-app').style.display = 'none';
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('userLogin').value = '';
                document.getElementById('userPass').value = '';
            }
        }
    </script>
</body>
</html>
