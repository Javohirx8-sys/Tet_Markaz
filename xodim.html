<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boyqozon ETK - Xodim Mobil Tizimi</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
        
        /* Splash Animatsiyasi */
        #splash-screen {
            position: fixed; top:0; left:0; width:100%; height:100%; background: #27ae60;
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #ffffff;
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Login Ekran */
        #login-screen { padding: 30px; display: flex; flex-direction: column; justify-content: center; height: 100vh; background: #2c3e50; color: white; }
        .input-group { margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 15px; border-radius: 8px; border: none; font-size: 16px; margin-top: 5px; }
        .btn { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }

        /* Ishchi Oyna */
        #work-screen { display: none; flex-direction: column; height: 100vh; }
        #map { flex-grow: 1; width: 100%; height: 50vh; }
        .control-panel { background: white; padding: 15px; border-radius: 15px 15px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 10px; max-height: 50vh; overflow-y: auto; }
        
        .chat-box { height: 120px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 8px; padding: 8px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .msg { padding: 6px 12px; border-radius: 12px; font-size: 13px; max-width: 80%; }
        .msg-in { background: #e1ffc7; align-self: flex-start; }
        .msg-out { background: #0084ff; color: white; align-self: flex-end; }
        .chat-input { display: flex; gap: 5px; }
        .chat-input input { flex-grow: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
    </style>
</head>
<body>

    <!-- Splash Animatsiyasi -->
    <div id="splash-screen">
        <div class="spinner"></div>
        <h2>Boyqozon ETK Mobil</h2>
    </div>

    <!-- Login -->
    <div id="login-screen">
        <h2>Tizimga Kirish</h2>
        <div class="input-group">
            <input type="text" id="loginInput" placeholder="Login">
        </div>
        <div class="input-group">
            <input type="password" id="passwordInput" placeholder="Parol">
        </div>
        <button class="btn" onclick="loginUser()">Tizimga Kirish</button>
        <p id="loginError" style="color:red; display:none; margin-top:10px;"></p>
    </div>

    <!-- Ishchi Oyna -->
    <div id="work-screen">
        <div id="map"></div>
        <div class="control-panel">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h4 style="margin:0;" id="userTitle">...</h4>
                <button class="btn" id="trackBtn" style="width:auto; padding:8px 15px;" onclick="toggleTracking()">Navbatchilikni boshlash</button>
            </div>
            
            <div id="gpsStatus" style="font-size:12px; color:#7f8c8d;">Navbatchilik boshlanmagan</div>

            <!-- Chat -->
            <div class="chat-box" id="chat-box-area"></div>
            <div class="chat-input">
                <input type="text" id="mChatInput" placeholder="Adminga yozish...">
                <button class="btn" style="width:auto;" onclick="sendMessage()">↗</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://sgnuqwqbyystmyfgikko.supabase.co";
        const SUPABASE_KEY = "sb_publishable_M0j9s_er4k9wDiZgBNWQuQ_1YyqHFY8";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        setTimeout(() => { document.getElementById('splash-screen').style.display = 'none'; }, 1500);

        let loggedUser = null, map, watchId = null, isTracking = false, myMarker = null, routeMarkers = [];

        async function loginUser() {
            const l = document.getElementById('loginInput').value.trim();
            const p = document.getElementById('passwordInput').value.trim();
            const { data, error } = await supabaseClient.from('xodimlar_gps').select('*').eq('login', l).eq('parol', p).single();

            if (!error && data) {
                loggedUser = data;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('work-screen').style.display = 'flex';
                document.getElementById('userTitle').innerText = data.ism;
                initMap();
                loadChat();
                setInterval(loadChat, 4000);
                setInterval(checkTasksAndLocation, 4000); // Yo'nalishlarni yuklash va unga yaqinlikni tekshirish
            } else {
                document.getElementById('loginError').innerText = "Noto'g'ri login yoki parol!";
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function initMap() {
            map = L.map('map').setView([41.295, 69.695], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        // Kuzatishni yoqish/o'chirish
        function toggleTracking() {
            if (!isTracking) {
                isTracking = true;
                document.getElementById('trackBtn').innerText = "Yakunlash";
                document.getElementById('trackBtn').style.background = "#c0392b";
                startGps();
            } else {
                isTracking = false;
                document.getElementById('trackBtn').innerText = "Navbatchilikni boshlash";
                document.getElementById('trackBtn').style.background = "#27ae60";
                stopGps();
            }
        }

        function startGps() {
            watchId = navigator.geolocation.watchPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;

                // Xaritada o'zini yangilash
                if (myMarker) myMarker.setLatLng([lat, lng]);
                else myMarker = L.circleMarker([lat, lng], {color: '#27ae60', radius: 10}).addTo(map);
                map.setView([lat, lng]);

                await supabaseClient.from('xodimlar_gps').update({ lat, lng, status: 'online' }).eq('id', loggedUser.id);
                document.getElementById('gpsStatus').innerText = `GPS online. Lat: ${lat.toFixed(5)}, Lng: ${lng.toFixed(5)}`;
                
                checkTaskDistance(lat, lng); // Nuqtaga yaqin kelganini tekshirish
            }, null, { enableHighAccuracy: true });
        }

        function stopGps() {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            supabaseClient.from('xodimlar_gps').update({ lat: null, lng: null, status: 'offline' }).eq('id', loggedUser.id);
            document.getElementById('gpsStatus').innerText = "GPS o'chirildi.";
        }

        // Reja/Vazifalarni va ularning bajarilganini tekshirish (Masofa hisoblash)
        let loadedTasks = [];
        async function checkTasksAndLocation() {
            if (!loggedUser) return;
            const { data, error } = await supabaseClient.from('vazifalar').select('*').eq('xodim_id', loggedUser.id);
            if (!error && data) {
                loadedTasks = data;
                
                // Eski vazifa markerlarini o'chirish
                routeMarkers.forEach(m => map.removeLayer(m));
                routeMarkers = [];

                data.forEach(t => {
                    const color = t.bajarildi ? '#2ecc71' : '#e74c3c'; // Bajarilgan bo'lsa yashil, bo'lmasa qizil
                    const m = L.marker([t.lat, t.lng], {
                        icon: L.divIcon({
                            className: 'task-icon',
                            html: `<div style="background:${color}; color:white; font-weight:bold; border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; border:2px solid black;">${t.nuqta_nomi}</div>`,
                            iconSize: [24, 24]
                        })
                    }).addTo(map);
                    routeMarkers.push(m);
                });
            }
        }

        // Koordinatalar orasidagi masofani tekshiradigan kichik formula (Agar xodim nuqtaga 50 metrga yaqin kelsa, bajarildi qiladi)
        function checkTaskDistance(myLat, myLng) {
            loadedTasks.forEach(async (task) => {
                if (task.bajarildi) return;
                
                const d = getDistance(myLat, myLng, task.lat, task.lng);
                if (d < 50) { // 50 metrdan yaqin bo'lsa
                    await supabaseClient.from('vazifalar').update({ bajarildi: true, bajarilgan_vaqt: new Date().toISOString() }).eq('id', task.id);
                    checkTasksAndLocation(); // Yangilaymiz
                }
            });
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // Yer radiusi
            const phi1 = lat1 * Math.PI/180;
            const phi2 = lat2 * Math.PI/180;
            const dphi = (lat2-lat1) * Math.PI/180;
            const dlambda = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dphi/2) * Math.sin(dphi/2) + Math.cos(phi1) * Math.cos(phi2) * Math.sin(dlambda/2) * Math.sin(dlambda/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // Chat funksiyalari
        async function loadChat() {
            if (!loggedUser) return;
            const { data, error } = await supabaseClient.from('chat_messages')
                .select('*')
                .or(`sender_id.eq.${loggedUser.id},receiver_id.eq.${loggedUser.id}`)
                .order('created_at', { ascending: true });

            if (!error && data) {
                const box = document.getElementById('chat-box-area');
                box.innerHTML = data.map(m => `
                    <div class="msg ${m.sender_id === loggedUser.id ? 'msg-out' : 'msg-in'}">
                        ${m.message}
                    </div>
                `).join('');
                box.scrollTop = box.scrollHeight;
            }
        }

        async function sendMessage() {
            const msg = document.getElementById('mChatInput').value.trim();
            if (!msg || !loggedUser) return;
            await supabaseClient.from('chat_messages').insert([{ sender_id: loggedUser.id, receiver_id: 'admin', message: msg }]);
            document.getElementById('mChatInput').value = '';
            loadChat();
        }
    </script>
</body>
</html>
