<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI AGRO - Admin Panel (Parkent)</title>
    <!-- Leaflet xarita kutubxonasi -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Supabase CDN -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background-color: #1e272e; color: #fff; overflow: hidden; }
        
        /* Yon menyu uslublari */
        #sidebar { width: 380px; background-color: #2f3542; display: flex; flex-direction: column; border-right: 2px solid #57606f; z-index: 10; }
        .sidebar-header { padding: 20px; background-color: #1e272e; text-align: center; border-bottom: 2px solid #57606f; }
        .sidebar-header h2 { color: #1dd1a1; font-size: 22px; }
        
        #xodimlar-list { flex: 1; overflow-y: auto; padding: 15px; }
        .xodim-item { background: #3f4a5c; padding: 15px; margin-bottom: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; border-left: 5px solid #747d8c; }
        .xodim-item:hover { background: #4b5970; }
        .xodim-item.selected { border-left-color: #1dd1a1; background: #485460; }
        
        .status-badge { padding: 4px 8px; font-size: 11px; font-weight: bold; border-radius: 4px; }
        .status-online { background-color: #10ac84; color: white; }
        .status-offline { background-color: #ff4757; color: white; }
        
        .progress-container { background-color: #2f3542; border-radius: 4px; height: 8px; margin-top: 10px; overflow: hidden; }
        .progress-bar { background-color: #1dd1a1; height: 100%; width: 0%; transition: width 0.3s; }
        
        /* Xarita uslubi */
        #map-container { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }
        
        /* Boshqaruv elementlari */
        .controls-panel { padding: 15px; background: #2f3542; border-top: 2px solid #57606f; }
        .btn { width: 100%; padding: 12px; background: #1dd1a1; border: none; color: #1e272e; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn:hover { background: #10ac84; color: white; }
        
        /* Modal va formalar */
        .admin-section { padding: 15px; border-top: 1px solid #57606f; display: flex; flex-direction: column; gap: 8px; }
        select, input { width: 100%; padding: 10px; background: #3f4a5c; border: 1px solid #57606f; color: white; border-radius: 4px; outline: none; }
        
        #crud-section { display: none; position: absolute; top: 20px; right: 20px; width: 400px; max-height: 85vh; background: #2f3542; border-radius: 12px; border: 2px solid #57606f; z-index: 1000; padding: 20px; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .btn-action { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-warning { background: #f1c40f; color: #2c3e50; }
        .btn-danger { background: #e74c3c; color: white; }
        .close-btn { float: right; cursor: pointer; font-size: 20px; color: #ff4757; }
    </style>
</head>
<body>

    <!-- Chap tomondagi ro'yxat paneli -->
    <div id="sidebar">
        <div class="sidebar-header">
            <h2>AI AGRO Monitoring</h2>
            <p style="font-size: 12px; color: #a4b0be; margin-top: 4px;">Parkent Tumani Tizimi</p>
        </div>
        
        <div id="xodimlar-list">
            <!-- Xodimlar ro'yxati JS orqali yuklanadi -->
            <p style="text-align:center; color:#a4b0be; padding:20px;">Xodimlar yuklanmoqda...</p>
        </div>

        <div class="admin-section">
            <label style="font-size:13px; color:#a4b0be;">Xodim tanlang va marshrutni ko'ring:</label>
            <select id="routeXodimSelect" onchange="showXodimRoute(this.value)">
                <option value="">-- Tanlash --</option>
            </select>
        </div>

        <div class="controls-panel">
            <button class="btn" onclick="toggleCrudSection()">Xodimlarni Boshqarish</button>
        </div>
    </div>

    <!-- O'ng tomondagi Xarita paneli -->
    <div id="map-container">
        <div id="map"></div>
        
        <!-- Xodimlarni tahrirlash (CRUD) oynasi -->
        <div id="crud-section">
            <span class="close-btn" onclick="toggleCrudSection()">&times;</span>
            <h3 style="margin-bottom:15px; color:#1dd1a1;">Xodimlar Ro'yxati va Tahrirlash</h3>
            
            <div style="margin-bottom: 20px; background:#3f4a5c; padding:12px; border-radius:6px;">
                <h4 style="margin-bottom:8px;">Yangi xodim qo'shish</h4>
                <input type="text" id="newXodimIsm" placeholder="Ism va Familiya" style="margin-bottom:8px;">
                <input type="text" id="newXodimLogin" placeholder="Login" style="margin-bottom:8px;">
                <input type="password" id="newXodimParol" placeholder="Parol" style="margin-bottom:8px;">
                <input type="text" id="newXodimTel" placeholder="Telefon raqami" style="margin-bottom:12px;">
                <button class="btn" onclick="addXodim()">Saqlash</button>
            </div>

            <div id="crud-xodimlar-list">
                <!-- CRUD ro'yxat -->
            </div>
        </div>
    </div>

    <script>
        // --- 1. SUPABASE SOZLAMALARI ---
        const SUPABASE_URL = "https://wzajrscwexgvsfeewpyp.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6YWpyc2N3ZXhndnNmZWV3cHlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzcyNDc3MDMsImV4cCI6MjA1MjgyMzcwM30.bVpXfD9rZ_n78E0X98L_69x7X_mX88X-m78X98L_69x";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 2. XARITA AMALLARI ---
        // Parkent tumani markaziga mo'ljallangan boshlang'ich koordinatalar
        const map = L.map('map').setView([41.2944, 69.6761], 12); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let activeMarkers = {};
        let routeLine = null;
        let selectedXodimId = null;
        let globalXodimlarList = [];

        // --- 3. JONLI MA'LUMOTLARNI YUKLASH FUNKSIYASI (UTC TUZATILISHI) ---
        async function fetchXodimlar() {
            try {
                // Xodimlarni olish
                const { data: xodimlar, error } = await supabaseClient.from('xodimlar_gps').select('*');
                if (error) throw error;
                globalXodimlarList = xodimlar;

                // Vazifalar ro'yxatini olish
                const { data: allTasks } = await supabaseClient.from('vazifalar').select('*');

                // Select elementlarni yangilash
                const routeSelect = document.getElementById('routeXodimSelect');
                const prevRouteVal = routeSelect.value;

                routeSelect.innerHTML = '<option value="">-- Tanlash --</option>';
                xodimlar.forEach(x => {
                    const opt = `<option value="${x.id}">${x.ism}</option>`;
                    routeSelect.innerHTML += opt;
                });
                if (prevRouteVal) routeSelect.value = prevRouteVal;

                // Chap paneldagi ro'yxatni tozalash
                const listDiv = document.getElementById('xodimlar-list');
                listDiv.innerHTML = '';
                
                // JORIY VAQTNI UTC FORMATGA O'TKAZISH (Timezone farqini 100% yo'qotadi)
                const hozirgiVaqtUTC = new Date().getTime() + (new Date().getTimezoneOffset() * 60000);

                xodimlar.forEach(xodim => {
                    let oxirgiAktivlik = xodim.updated_at ? new Date(xodim.updated_at).getTime() : 0;
                    
                    // Mahalliy va UTC formatlardagi farqlarni millisekundda solishtirish
                    let vaqtFarqi = Math.abs(new Date().getTime() - oxirgiAktivlik);
                    let vaqtFarqiUTC = Math.abs(hozirgiVaqtUTC - oxirgiAktivlik);
                    
                    let realStatus = xodim.status;
                    
                    // Tarmoq va GPS kechikish limitini 35 soniya qilib belgilaymiz
                    if (vaqtFarqi > 35000 && vaqtFarqiUTC > 35000) {
                        realStatus = 'offline';
                    }

                    const isOnline = realStatus === 'online';
                    
                    // Reja va progress foizini hisoblash
                    const xTasks = allTasks ? allTasks.filter(t => t.xodim_id === xodim.id) : [];
                    const completedCount = xTasks.filter(t => t.bajarildi).length;
                    const totalCount = xTasks.length;
                    const percent = totalCount > 0 ? Math.round((completedCount / totalCount) * 100) : 0;
                    const isSelectedClass = selectedXodimId === xodim.id ? 'selected' : '';

                    // Interfeys elementi
                    listDiv.innerHTML += `
                        <div class="xodim-item ${isSelectedClass}" onclick="selectXodim('${xodim.id}')">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span style="font-size: 17px; font-weight: bold;">${xodim.ism}</span>
                                <span class="status-badge ${isOnline ? 'status-online' : 'status-offline'}">${isOnline ? 'ONLINE' : 'OFFLINE'}</span>
                            </div>
                            <div style="font-size:14px; margin-top:8px; color:#c8d6e5;">
                                ID: ${xodim.id} | Reja: <b>${completedCount}/${totalCount} (${percent}%)</b>
                            </div>
                            <div class="progress-container">
                                <div class="progress-bar" style="width: ${percent}%;"></div>
                            </div>
                        </div>
                    `;
                    
                    // Xaritada jonli koordinata nuqtalarini yangilash
                    if (isOnline && xodim.lat && xodim.lng) {
                        const pos = [xodim.lat, xodim.lng];
                        if (activeMarkers[xodim.id]) {
                            activeMarkers[xodim.id].setLatLng(pos);
                        } else {
                            activeMarkers[xodim.id] = L.circleMarker(pos, {
                                color: '#10ac84', fillColor: '#1dd1a1', fillOpacity: 0.9, radius: 14, weight: 4
                            }).addTo(map).bindPopup(`<b>${xodim.ism}</b><br>Hozir onlayn rejimda.`);
                            
                            activeMarkers[xodim.id].on('click', () => { selectXodim(xodim.id); });
                        }
                    } else {
                        // Oflayn bo'lsa xaritadan marker olib tashlanadi
                        if (activeMarkers[xodim.id]) { 
                            map.removeLayer(activeMarkers[xodim.id]); 
                            delete activeMarkers[xodim.id]; 
                        }
                    }
                });

                // CRUD ro'yxatni yangilash
                updateCrudList(xodimlar);

            } catch (err) { 
                console.error("Ma'lumotlarni yuklashda xatolik:", err); 
            }
        }

        // --- 4. QO'SHIMCHA BOSHQARUV FUNKSIYALARI ---
        function updateCrudList(xodimlar) {
            const crudList = document.getElementById('crud-xodimlar-list');
            crudList.innerHTML = xodimlar.map(x => `
                <div class="xodim-item" style="cursor:default;">
                    <b style="font-size:16px;">${x.ism}</b> <br>
                    <span style="font-size:13px; color:#c8d6e5;">(Login: ${x.login} | Tel: ${x.tel || 'Yo\'q'})</span>
                    <div style="margin-top:12px; display:flex; gap:10px;">
                        <button class="btn-action btn-warning" onclick="editXodim('${x.id}', '${x.ism}')">Tahrirlash</button>
                        <button class="btn-action btn-danger" onclick="deleteXodim('${x.id}')">O'chirish</button>
                    </div>
                </div>
            `).join('');
        }

        function selectXodim(id) {
            selectedXodimId = id;
            const target = globalXodimlarList.find(x => x.id === id);
            if (target && target.lat && target.lng) {
                map.panTo([target.lat, target.lng]);
                if (activeMarkers[id]) activeMarkers[id].openPopup();
            }
            fetchXodimlar();
        }

        // Kunlik marshrut liniyasini chizish
        async function showXodimRoute(id) {
            if (!id) {
                if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
                return;
            }
            try {
                const bugun = new Date().toISOString().split('T')[0];
                const { data: logs, error } = await supabaseClient
                    .from('gps_logs')
                    .select('lat, lng')
                    .eq('xodim_id', id)
                    .gte('created_at', bugun + 'T00:00:00')
                    .order('created_at', { ascending: true });

                if (error) throw error;

                if (routeLine) { map.removeLayer(routeLine); }

                if (logs && logs.length > 0) {
                    const latLngs = logs.map(l => [l.lat, l.lng]);
                    routeLine = L.polyline(latLngs, { color: '#2e86de', weight: 5, dashArray: '5, 10' }).addTo(map);
                    map.fitBounds(routeLine.getBounds());
                } else {
                    alert("Xodimning bugungi harakatlar tarixi (log) topilmadi.");
                }
            } catch (err) { console.error(err); }
        }

        // Yangi xodim qo'shish
        async function addXodim() {
            const ism = document.getElementById('newXodimIsm').value;
            const login = document.getElementById('newXodimLogin').value;
            const parol = document.getElementById('newXodimParol').value;
            const tel = document.getElementById('newXodimTel').value;

            if (!ism || !login || !parol) { alert("Majburiy maydonlarni to'ldiring!"); return; }

            try {
                const { error } = await supabaseClient.from('xodimlar_gps').insert([
                    { ism, login, parol, tel, status: 'offline' }
                ]);
                if (error) throw error;
                
                alert("Yangi xodim muvaffaqiyatli qo'shildi!");
                document.getElementById('newXodimIsm').value = '';
                document.getElementById('newXodimLogin').value = '';
                document.getElementById('newXodimParol').value = '';
                document.getElementById('newXodimTel').value = '';
                fetchXodimlar();
            } catch (err) { alert("Xatolik yuz berdi: " + err.message); }
        }

        // Xodimni bazadan o'chirish
        async function deleteXodim(id) {
            if (!confirm("Haqiqatdan ham ushbu xodimni tizimdan o'chirmoqchimisiz?")) return;
            try {
                const { error } = await supabaseClient.from('xodimlar_gps').delete().eq('id', id);
                if (error) throw error;
                fetchXodimlar();
            } catch (err) { alert(err.message); }
        }

        // Ismni tezkor tahrirlash
        async function editXodim(id, joriyIsm) {
            const yangiIsm = prompt("Yangi ismni kiriting:", joriyIsm);
            if (!yangiIsm) return;
            try {
                const { error } = await supabaseClient.from('xodimlar_gps').update({ ism: yangiIsm }).eq('id', id);
                if (error) throw error;
                fetchXodimlar();
            } catch (err) { alert(err.message); }
        }

        function toggleCrudSection() {
            const sec = document.getElementById('crud-section');
            sec.style.display = (sec.style.display === 'block') ? 'none' : 'block';
        }

        // --- 5. JONLI YANGILANISH (AVTO-STREAM) ---
        // Har 4 soniyada ma'lumotlarni tekshirib yangilab turadi
        fetchXodimlar();
        setInterval(fetchXodimlar, 4000);

    </script>
</body>
</html>
