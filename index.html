<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boyqozon ETK - Sinov Xaritasi</title>
    
    <!-- Leaflet.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }
        #map {
            height: 100vh;
            width: 100vw;
            background-color: #ddd;
        }
    </style>
</head>
<body>

    <!-- Test uchun to'liq ekranli xarita -->
    <div id="map"></div>

    <!-- Leaflet.js JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Xaritani Boyqozon koordinatalarida ochish
        const map = L.map('map').setView([41.295, 69.695], 14);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Sinov uchun bitta marker qo'yamiz
        L.marker([41.295, 69.695]).addTo(map).bindPopup("Sinov markazi").openPopup();
    </script>
</body>
</html>
