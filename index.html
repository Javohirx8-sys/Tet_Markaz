<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boyqozon ETK - Rahbar Paneli</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: Arial, sans-serif;
            display: flex;
        }
        #sidebar {
            width: 340px; background: #2c3e50; color: white;
            padding: 15px; display: flex; flex-direction: column;
            overflow-y: auto; height: 100vh; flex-shrink: 0;
        }
        #map { flex-grow: 1; height: 100vh; background-color: #e5e9f0; }
        h2, h3 { margin-top: 0; border-bottom: 2px solid #34495e; padding-bottom: 8px; }
        h3 { font-size: 16px; margin-top: 15px; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 12px; margin-bottom: 3px; color: #bdc3c7; }
        .form-group input {
            width: 100%; padding: 8px; border: none;
            border-radius: 4px; background: #34495e; color: white;
        }
        .btn-add {
            width: 100%; padding: 10px; background: #1abc9c;
            border: none; color: white; font-weight: bold;
            border-radius: 4px; cursor: pointer; margin-top: 5px;
        }
        .btn-add:hover { background: #16a085; }
        #xodimlar-list {
            margin-top: 15px; flex-grow: 1;
        }
        .xodim-item {
            background: #34495e; padding: 10px;
            border-radius: 6px; margin-bottom: 8px; font-size: 13px;
        }
        .status-badge {
            display: inline-block; padding: 2px 6px;
            border-radius: 4px; font-size: 11px; font-weight: bold;
            margin-top: 5px;
        }
        .status-online { background: #27ae60; color: white; }
        .status-offline { background: #7f8c8d; color: white; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Boyqozon ETK</h2>
        <p><b>Rahbar:</b> ID-ADMIN-01</p>
        
        <!-- XODIM QO'SHISH FORMASI -->
        <h3>➕ Yangi Xodim Qo'shish</h3>
        <div class="form-group">
            <label>Xodim ID (masalan: XODIM_02)</label>
            <input type="text" id="newId" placeholder="XODIM_02">
        </div>
        <div class="form-group">
            <label>Ism va Familiya</label>
            <input type="text" id="newName" placeholder="Ali Valiyer">
        </div>
        <div class="form-group">
            <label>Telefon raqam</label>
            <input type="text" id="newTel" placeholder="+998901234567">
        </div>
        <div class="form-group">
            <label>Kirish Logini</label>
            <input type="text" id="newLogin" placeholder="ali99">
        </div>
        <div class="form-group">
            <label>Parol</label>
            <input type="password" id="newParol" placeholder="parol123">
        </div>
        <button class="btn-add" onclick="addNewXodim()">Bazaga Qo'shish</button>

        <!-- JONLI XODIMLAR RO'YXATI -->
        <h3>👥 Xodimlar Nazorati (GPS)</h3>
        <div id="xodimlar-list">Xodimlar yuklanmoqda...</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        const SUPABASE_URL = "https://sgnuqwqbyystmyfgikko.supabase.co";
        const SUPABASE_KEY = "sb_publishable_M0j9s_er4k9wDiZgBNWQuQ_1YyqHFY8";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const map = L.map('map').setView([41.295, 69.695], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Transformatorlar markerlari
        const transformatorlar = [
            { id: "TP-01", nomi: "Boyqozon 1-transformator", lat: 41.298, lng: 69.692 },
            { id: "TP-02", nomi: "Boyqozon 2-transformator", lat: 41.293, lng: 69.698 },
            { id: "TP-03", nomi: "Boyqozon 3-transformator", lat: 41.291, lng: 69.695 }
        ];
        transformatorlar.forEach(tp => {
            L.marker([tp.lat, tp.lng]).addTo(map).bindPopup(`<b>${tp.nomi}</b><br>ID: ${tp.id}`);
        });

        // Xodimlarning markerlari va chiziqlarini saqlash uchun obektlar
        let activeMarkers = {};
        let activePaths = {};

        // 1. Yangi xodim qo'shish funksiyasi
        async function addNewXodim() {
            const id = document.getElementById('newId').value.trim();
            const ism = document.getElementById('newName').value.trim();
            const tel = document.getElementById('newTel').value.trim();
            const login = document.getElementById('newLogin').value.trim();
            const parol = document.getElementById('newParol').value.trim();

            if (!id || !ism || !login || !parol) {
                alert("Iltimos, barcha maydonlarni to'ldiring!");
                return;
            }

            const { error } = await supabaseClient
                .from('xodimlar_gps')
                .insert([{ id, ism, tel, login, parol, status: 'offline' }]);

            if (error) {
                alert("Xatolik yuz berdi: " + error.message);
            } else {
                alert(`${ism} muvaffaqiyatli qo'shildi!`);
                // Formani tozalash
                document.getElementById('newId').value = '';
                document.getElementById('newName').value = '';
                document.getElementById('newTel').value = '';
                document.getElementById('newLogin').value = '';
                document.getElementById('newParol').value = '';
                fetchXodimlar();
            }
        }

        // 2. Barcha xodimlarni bazadan olib xaritada yangilash
        async function fetchXodimlar() {
            try {
                const { data: xodimlar, error } = await supabaseClient
                    .from('xodimlar_gps')
                    .select('*');

                if (error) throw error;

                const listDiv = document.getElementById('xodimlar-list');
                listDiv.innerHTML = '';

                xodimlar.forEach(xodim => {
                    // Sidebar ro'yxatini yaratish
                    const item = document.createElement('div');
                    item.className = 'xodim-item';
                    const isOnline = xodim.status === 'online';
                    const badgeClass = isOnline ? 'status-online' : 'status-offline';
                    
                    item.innerHTML = `
                        <b>ID:</b> ${xodim.id}<br>
                        <b>Ism:</b> ${xodim.ism}<br>
                        <b>Tel:</b> ${xodim.tel || 'Kiritilmagan'}<br>
                        <span class="status-badge ${badgeClass}">${xodim.status.toUpperCase()}</span>
                    `;
                    listDiv.appendChild(item);

                    // Xaritadagi markerlarni boshqarish
                    if (isOnline && xgrid = xodim.lat && xodim.lng) {
                        const pos = [xodim.lat, xgrid = xodim.lng];
                        
                        // Agar marker allaqachon xaritada bo'lsa, joyini yangilaymiz
                        if (activeMarkers[xodim.id]) {
                            activeMarkers[xodim.id].setLatLng(pos);
                        } else {
                            // Yangi marker yaratamiz
                            activeMarkers[xodim.id] = L.circleMarker(pos, {
                                color: '#e74c3c', fillColor: '#e74c3c', fillOpacity: 1, radius: 9
                            }).addTo(map).bindPopup(`<b>${xodim.ism}</b><br>ID: ${xodim.id}`);
                        }

                        // Marshrut chizig'ini yangilash
                        if (!activePaths[xodim.id]) {
                            activePaths[xodim.id] = L.polyline([], {color: '#2980b9', weight: 4}).addTo(map);
                        }
                        // Chiziqqa nuqta qo'shish
                        const currentPath = activePaths[xodim.id].getLatLngs();
                        const lastPoint = currentPath[currentPath.length - 1];
                        if (!lastPoint || lastPoint.lat !== xodim.lat || lastPoint.lng !== xodim.lng) {
                            activePaths[xodim.id].addLatLng(pos);
                        }

                    } else {
                        // Agar xodim offline bo'lsa, uning markerini va chizig'ini xaritadan o'chiramiz
                        if (activeMarkers[xodim.id]) {
                            map.removeLayer(activeMarkers[xodim.id]);
                            delete activeMarkers[xodim.id];
                        }
                        if (activePaths[xodim.id]) {
                            map.removeLayer(activePaths[xodim.id]);
                            delete activePaths[xodim.id];
                        }
                    }
                });

            } catch (err) {
                console.error("Xodimlarni yuklashda xatolik:", err);
            }
        }

        // Har 3 soniyada xodimlarni yangilab turamiz
        setInterval(fetchXodimlar, 3000);
        fetchXodimlar();
    </script>
</body>
</html>
