<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boyqozon ETK - Rahbar Paneli</title>
    
    <!-- Leaflet.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
            display: flex;
        }
        #sidebar {
            width: 320px;
            background: #2c3e50;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            height: 100vh;
            flex-shrink: 0;
        }
        #map {
            flex-grow: 1;
            height: 100vh;
            width: calc(100vw - 320px);
            background-color: #e5e9f0;
        }
        h2 { margin-top: 0; font-size: 20px; border-bottom: 2px solid #34495e; padding-bottom: 10px;}
        .tp-card {
            background: #34495e;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tp-card:hover {
            background: #1abc9c;
        }
        .status-box {
            background: #e67e22; /* Kutish rangi */
            padding: 15px;
            border-radius: 6px;
            margin-top: auto;
            font-size: 13px;
            transition: 0.3s;
        }
        /* Online holat uchun chiroyli yashil rang */
        .status-online {
            background: #27ae60 !important;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Boyqozon ETK</h2>
        <p><b>Rahbar:</b> ID-ADMIN-01</p>
        <p>Transformatorlar ro'yxati:</p>
        <div id="tp-list"></div>
        
        <div class="status-box" id="status-container">
            <h4>Jonli Nazorat (GPS)</h4>
            <div id="xodim-status">Xodim ulanishi kutilmoqda...</div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        const SUPABASE_URL = "https://sgnuqwqbyystmyfgikko.supabase.co";
        const SUPABASE_KEY = "sb_publishable_M0j9s_er4k9wDiZgBNWQuQ_1YyqHFY8";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const map = L.map('map').setView([41.295, 69.695], 14);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Transformatorlar koordinatalari
        const transformatorlar = [
            { id: "TP-01", nomi: "Boyqozon 1-transformator", lat: 41.298, lng: 69.692 },
            { id: "TP-02", nomi: "Boyqozon 2-transformator", lat: 41.293, lng: 69.698 },
            { id: "TP-03", nomi: "Boyqozon 3-transformator", lat: 41.291, lng: 69.695 }
        ];

        const tpListDiv = document.getElementById('tp-list');

        transformatorlar.forEach(tp => {
            const marker = L.marker([tp.lat, tp.lng]).addTo(map);
            marker.bindPopup(`<b>${tp.nomi}</b><br>ID: ${tp.id}`);

            const card = document.createElement('div');
            card.className = 'tp-card';
            card.innerHTML = `<strong>${tp.id}</strong> - ${tp.nomi}`;
            card.onclick = () => {
                map.setView([tp.lat, tp.lng], 16);
                marker.openPopup();
            };
            tpListDiv.appendChild(card);
        });

        // Xodimning qizil markeri
        let xodimMarker = L.circleMarker([41.295, 69.695], {
            color: '#e74c3c',
            fillColor: '#e74c3c',
            fillOpacity: 1,
            radius: 9
        });
        xodimMarker.bindPopup("<b>Xodim: Vali Aliyev</b>");

        let isMarkerOnMap = false;

        // 🔀 Marshrutni (yurilgan yo'lni) saqlash uchun massiv va Leaflet Polyline obyekti
        let xodimYoliKoordinatalari = [];
        let xodimYoliLiniyasi = L.polyline([], {
            color: '#2980b9', // Chiziqning ko'k rangi
            weight: 5,        // Chiziqning qalinligi
            opacity: 0.8,     // Shaffofligi
            dashArray: '10, 10' // Chiziq-chiziq (punktir) ko'rinishida bo'lishi uchun
        }).addTo(map);

        async function getXodimLocation() {
            try {
                const { data, error } = await supabaseClient
                    .from('xodimlar_gps')
                    .select('*')
                    .eq('id', 'XODIM_01')
                    .single();

                if (error) {
                    console.error("Xatolik:", error.message);
                    return;
                }

                if (data) {
                    const statusContainer = document.getElementById('status-container');
                    const xodimStatusText = document.getElementById('xodim-status');

                    // Agar xodim ONLINE bo'lsa
                    if (data.status === "online" && data.lat && data.lng) {
                        const newLatLng = new L.LatLng(data.lat, data.lng);
                        xodimMarker.setLatLng(newLatLng);
                        
                        if (!isMarkerOnMap) {
                            xodimMarker.addTo(map);
                            isMarkerOnMap = true;
                        }

                        // 📍 Yangi koordinatani marshrut tarixiga qo'shamiz
                        // Faqatgina oxirgi koordinatadan farq qilsa qo'shamiz (ortiqcha nuqtalar ko'payib ketmasligi uchun)
                        if (xodimYoliKoordinatalari.length === 0 || 
                            xodimYoliKoordinatalari[xodimYoliKoordinatalari.length - 1].lat !== data.lat ||
                            xodimYoliKoordinatalari[xodimYoliKoordinatalari.length - 1].lng !== data.lng) {
                            
                            xodimYoliKoordinatalari.push(newLatLng);
                            // Xaritadagi chiziqni yangi nuqtalar bilan yangilaymiz
                            xodimYoliLiniyasi.setLatLngs(xodimYoliKoordinatalari);
                        }

                        statusContainer.classList.add('status-online');

                        const vaqt = new Date(data.oxirgi_yangilanish).toLocaleTimeString();
                        xodimStatusText.innerHTML = `
                            <b>Status:</b> <span style="color: #fff; font-weight: bold;">ONLINE</span><br>
                            <b>Ism:</b> ${data.ism}<br>
                            <b>Tel:</b> ${data.tel}<br>
                            <b>Oxirgi faollik:</b> ${vaqt}<br>
                            <b>GPS:</b> ${data.lat.toFixed(5)}, ${data.lng.toFixed(5)}
                        `;
                    } 
                    // Agar xodim OFFLINE bo'lsa
                    else {
                        if (isMarkerOnMap) {
                            map.removeLayer(xodimMarker);
                            isMarkerOnMap = false;
                        }

                        // 🧹 Xodim oflayn bo'lganda eski yurgan yo'llarini tozalab tashlaymiz (yangi navbatchilik noldan boshlanishi uchun)
                        xodimYoliKoordinatalari = [];
                        xodimYoliLiniyasi.setLatLngs([]);

                        statusContainer.classList.remove('status-online');
                        xodimStatusText.innerHTML = `
                            <b>Status:</b> OFFLINE<br>
                            <small style="color: #eee;">Xodim navbatchilikda emas.</small>
                        `;
                    }
                }
            } catch (err) {
                console.error("Ulanish xatosi:", err);
            }
        }

        // Har 3 soniyada nazorat qilib turamiz
        setInterval(getXodimLocation, 3000);
        getXodimLocation();
    </script>
</body>
</html>
